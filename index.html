<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Digital Clock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1 id="greeting"></h1>

    <div class="clock">

      <h1 id="hour">00</h1>
      <span>:</span>

      <h1 id="minute">00</h1>
      <span>:</span>

      <h1 id="second">00</h1>

      <h2 id="ampm">AM</h2>

    </div>

    <h2 id="day"></h2>
    <h3 id="date"></h3>

  </div>

  <script src="script.js"></script>
</body>
</html>
